<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro PCD</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="card shadow p-4">
    <h2 class="mb-4 text-center">Cadastro para vagas PCD</h2>

    <form id="formCadastro">

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nome*</label>
          <input type="text" class="form-control" name="nome" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">CPF*</label>
          <input type="text" class="form-control" name="cpf" id="cpf" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Data de nascimento</label>
          <input type="date" class="form-control" name="data_nasc">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Telefone*</label>
          <input type="text" class="form-control" name="telefone" id="telefone" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Estado</label>
          <select class="form-control" id="estado"></select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Cidade</label>
          <select class="form-control" id="cidade"></select>
        </div>

      <button type="submit" class="btn btn-primary w-100">
        Cadastrar
      </button>

    </form>

    <div id="mensagem" class="mt-3"></div>
  </div>
</div>

<script>
/* ================= MÁSCARA CPF ================= */
document.getElementById('cpf').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');

  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

  e.target.value = v;
});

/* ================= MÁSCARA TELEFONE ================= */
document.getElementById('telefone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');

  v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
  v = v.replace(/(\d{5})(\d)/, '$1-$2');

  e.target.value = v;
});

/* ================= VALIDADOR CPF ================= */
function validarCPF(cpf) {
  cpf = cpf.replace(/\D/g, '');

  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

  let soma = 0;
  let resto;

  for (let i = 1; i <= 9; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;
  if (resto !== parseInt(cpf.substring(9, 10))) return false;

  soma = 0;
  for (let i = 1; i <= 10; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;

  return resto === parseInt(cpf.substring(10, 11));
}

/* ================= API CIDADE/ESTADO ================= */
async function carregarEstados() {
  const response = await fetch("https://servicodados.ibge.gov.br/api/v1/localidades/estados");
  const estados = await response.json();

  const selectEstado = document.getElementById("estado");

  estados.sort((a, b) => a.nome.localeCompare(b.nome));

  estados.forEach(estado => {
    const option = document.createElement("option");
    option.value = estado.sigla;
    option.textContent = estado.nome;
    selectEstado.appendChild(option);
  });
}

document.getElementById("estado").addEventListener("change", function () {
  carregarCidades(this.value);
});

async function carregarCidades(uf) {
  const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
  const cidades = await response.json();

  const selectCidade = document.getElementById("cidade");
  selectCidade.innerHTML = "";

  cidades.forEach(cidade => {
    const option = document.createElement("option");
    option.value = cidade.nome;
    option.textContent = cidade.nome;
    selectCidade.appendChild(option);
  });
}

carregarEstados();

/* ================= ENVIO ================= */
document.getElementById('formCadastro').addEventListener('submit', async function(e) {
  e.preventDefault();

  const form = e.target;
  const cpf = form.cpf.value;

  if (!validarCPF(cpf)) {
    document.getElementById('mensagem').innerHTML =
      '<div class="alert alert-danger">CPF inválido!</div>';
    return;
  }

  const data = {
    nome: form.nome.value,
    cpf: cpf.replace(/\D/g, ''),
    data_nasc: form.data_nasc.value,
    email: form.email.value,
    telefone: form.telefone.value.replace(/\D/g, ''),
    cidade: form.cidade.value,
    estado: form.estado.value
  };

  try {
    const res = await fetch('http://localhost:3000/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      document.getElementById('mensagem').innerHTML =
        '<div class="alert alert-success">Cadastro realizado!</div>';
      form.reset();
    } else {
      document.getElementById('mensagem').innerHTML =
        `<div class="alert alert-danger">${result.erro}</div>`;
    }

  } catch (error) {
    document.getElementById('mensagem').innerHTML =
      '<div class="alert alert-danger">Erro ao conectar com API</div>';
  }
});
</script>

</body>
</html>
