<!doctype html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro PCD</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="card shadow p-4">
    <h2 class="mb-4 text-center">Cadastro para vagas PCD</h2>

<form id="formCadastro">

  <!-- ================= DADOS BÁSICOS ================= -->
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Nome*</label>
      <input type="text" class="form-control" name="nome" required>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">CPF*</label>
      <input type="text" class="form-control" name="cpf" id="cpf" required>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Data de nascimento</label>
      <input type="date" class="form-control" name="data_nasc">
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email">
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Telefone*</label>
      <input type="text" class="form-control" name="telefone" id="telefone" required>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Estado</label>
      <select class="form-control" id="estado"></select>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Cidade</label>
      <select class="form-control" id="cidade"></select>
    </div>
  </div>

  <!-- ================= DEFICIÊNCIA ================= -->
  <hr>
  <h5>Deficiência</h5>
  <div class="row">
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="cid_codigo" placeholder="CID">
    </div>
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="descricao_def" placeholder="Descrição">
    </div>
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="grau" placeholder="Grau">
    </div>
  </div>

  <!-- ================= EXPERIÊNCIA ================= -->
  <hr>
  <h5>Experiência</h5>
  <div class="row">
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="cargo" placeholder="Cargo">
    </div>
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="empresa" placeholder="Empresa">
    </div>
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="area" placeholder="Área">
    </div>
  </div>

  <!-- ================= HABILIDADES ================= -->
  <hr>
  <h5>Habilidades</h5>
  <div class="row">
    <div class="col-md-6 mb-3">
      <input type="text" class="form-control" name="habilidade" placeholder="Habilidade">
    </div>
    <div class="col-md-6 mb-3">
  <select name="nivel" class="form-control">
    <option value="">Selecione o nível</option>
    <option value="basico">Básico</option>
    <option value="intermediario">Intermediário</option>
    <option value="avancado">Avançado</option>
  </select>
   </div>
  </div>

  <!-- ================= FORMAÇÃO ================= -->
  <hr>
  <h5>Formação</h5>
  <div class="row">
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="curso" placeholder="Curso">
    </div>
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="instituicao" placeholder="Instituição">
    </div>
    <div class="col-md-4 mb-3">
      <input type="number" class="form-control" name="ano_conclusao" placeholder="Ano">
    </div>
  </div>

  <!-- ================= PREFERÊNCIAS ================= -->
  <hr>
  <h5>Preferências</h5>
  <div class="row">
    <div class="col-md-4 mb-3">
      <input type="text" class="form-control" name="area_interesse" placeholder="Área de Interesse">
    </div>
    <div class="col-md-4 mb-3">
      <select name="modalidade" class="form-control" required>
      <option value="">Selecione</option>
      <option value="presencial">Presencial</option>
      <option value="hibrido">Híbrido</option>
      <option value="remoto">Remoto</option>
      <option value="indiferente">Indiferente</option>
      </select>
    </div>
    <div class="col-md-4 mb-3">
      <select name="regime_preferido" class="form-control" required>
  <option value="">Selecione</option>
  <option value="clt">CLT</option>
  <option value="pj">PJ</option>
  <option value="estagio">Estágio</option>
  <option value="temporario">Temporário</option>
  <option value="indiferente">Indiferente</option>
       </select>
    </div>
  </div>

  <button type="submit" class="btn btn-primary w-100">Cadastrar</button>

</form>

<div id="mensagem" class="mt-3"></div>

  </div>
</div>

<script>
// MÁSCARAS
document.getElementById('cpf').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  e.target.value = v;
});

document.getElementById('telefone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
  v = v.replace(/(\d{5})(\d)/, '$1-$2');
  e.target.value = v;
});

// VALIDA CPF
function validarCPF(cpf) {
  cpf = cpf.replace(/\D/g, '');
  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

  let soma = 0, resto;
  for (let i = 1; i <= 9; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

  resto = (soma * 10) % 11;
  if (resto >= 10) resto = 0;
  if (resto !== parseInt(cpf.substring(9, 10))) return false;

  soma = 0;
  for (let i = 1; i <= 10; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

  resto = (soma * 10) % 11;
  if (resto >= 10) resto = 0;

  return resto === parseInt(cpf.substring(10, 11));
}

// ESTADOS E CIDADES
async function carregarEstados() {
  const res = await fetch("https://servicodados.ibge.gov.br/api/v1/localidades/estados");
  const estados = await res.json();

  const select = document.getElementById("estado");
  estados.sort((a, b) => a.nome.localeCompare(b.nome));

  estados.forEach(e => {
    select.innerHTML += `<option value="${e.sigla}">${e.nome}</option>`;
  });
}

document.getElementById("estado").addEventListener("change", e => {
  carregarCidades(e.target.value);
});

async function carregarCidades(uf) {
  const res = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
  const cidades = await res.json();

  const select = document.getElementById("cidade");
  select.innerHTML = "";

  cidades.forEach(c => {
    select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
  });
}

carregarEstados();

// ENVIO

document.getElementById('formCadastro').addEventListener('submit', async function(e) {
  e.preventDefault();

  const form = e.target;

  if (!validarCPF(form.cpf.value)) {
    mensagem.innerHTML = '<div class="alert alert-danger">CPF inválido</div>';
    return;
  }

  try {
    const res = await fetch('http://localhost:3000/cadastro-completo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({

        // ================= DADOS PRINCIPAIS =================
        nome: form.nome.value,
        cpf: form.cpf.value,
        data_nasc: form.data_nasc.value || null,
        email: form.email.value || null,
        telefone: form.telefone.value.replace(/\D/g, ''),
        cidade: form.cidade.value || null,
        estado: form.estado.value || null,

        // ================= DADOS COMPLEMENTARES (TUDO EM UM) =================
        dados_complementares: {
          // DEFICIÊNCIA
          cid_codigo: form.cid_codigo.value || null,
          descricao: form.descricao_def.value || null,
          grau: form.grau.value || null,

          // EXPERIÊNCIA
          cargo: form.cargo.value || null,
          empresa: form.empresa.value || null,
          area: form.area.value || null,
        },

        // ================= FORMAÇÃO =================
        formacao: {
          curso: form.curso.value || null,
          instituicao: form.instituicao.value || null,
          ano_conclusao: form.ano_conclusao.value || null
        },

        // ================= PREFERÊNCIAS =================
        preferencias: {
          area_interesse: form.area_interesse.value || null,
          modalidade: form.modalidade.value || "indiferente",
          regime_preferido: form.regime_preferido.value || "indiferente"
        },

        // ================= HABILIDADES =================
        habilidade: form.habilidade.value ? {
        nome: form.habilidade.value,
        nivel: form.nivel.value
         } : null,

      })
    });

    const result = await res.json();
    if (!res.ok) throw new Error(result.erro);

    mensagem.innerHTML = '<div class="alert alert-success">Cadastro completo!</div>';
    form.reset();

  } catch (err) {
    mensagem.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
});

</script>


</body>
</html>
