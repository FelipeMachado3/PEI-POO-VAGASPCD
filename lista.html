<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Cadastros</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <h2 class="mb-4 text-center">Pessoas cadastradas</h2>

  <div class="text-center mb-3">
    <button class="btn btn-primary" onclick="listarPessoas()">
      Atualizar lista
    </button>
  </div>

  <div id="listaPessoas"></div>

</div>

<script>

// ================= LISTAR PESSOAS =================
async function listarPessoas() {
  const container = document.getElementById("listaPessoas");

  container.innerHTML = "Carregando...";

  try {
    const res = await fetch('http://localhost:3000/pessoas');
    const dados = await res.json();

    if (!dados.length) {
      container.innerHTML = '<div class="alert alert-warning">Nenhum cadastro encontrado</div>';
      return;
    }

    let html = `
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
    `;

    dados.forEach(p => {
      html += `
        <tr>
          <td>${p.nome}</td>
          <td>${p.email ?? '-'}</td>
          <td>${p.telefone}</td>
          <td>${p.cidade ?? '-'}</td>
          <td>
            <button class="btn btn-sm btn-info" onclick="verDetalhes('${p.id}')">
              Ver
            </button>
            <button class="btn btn-sm btn-danger" onclick="deletarPessoa('${p.id}')">
             Excluir
            </button>
          </td>
        </tr>
      `;
    });

    html += `</tbody></table>`;

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
}


// ================= VER DETALHES =================
async function verDetalhes(id) {
  const container = document.getElementById("listaPessoas");

  container.innerHTML = "Carregando detalhes...";

  try {
    const res = await fetch(`http://localhost:3000/pessoa/${id}`);
    const p = await res.json();

    let html = `
      <div class="card p-4 shadow">
        <button class="btn btn-secondary mb-3" onclick="listarPessoas()">← Voltar</button>

        <h4>${p.nome}</h4>
        <p><strong>CPF:</strong> ${p.cpf}</p>
        <p><strong>Email:</strong> ${p.email ?? '-'}</p>
        <p><strong>Telefone:</strong> ${p.telefone}</p>
        <p><strong>Cidade:</strong> ${p.cidade ?? '-'} - ${p.estado ?? '-'}</p>

        <hr>

        <h5>Deficiência</h5>
        ${
          p.deficiencias.length
            ? p.deficiencias.map(d => `
              <p>${d.descricao ?? '-'} (${d.cid_codigo ?? '-'}) - ${d.grau ?? '-'}</p>
            `).join('')
            : '<p>Não informado</p>'
        }

        <h5>Experiência</h5>
        ${
          p.experiencias.length
            ? p.experiencias.map(e => `
              <p>${e.cargo ?? '-'} - ${e.empresa ?? '-'} (${e.area ?? '-'})</p>
            `).join('')
            : '<p>Não informado</p>'
        }

        <h5>Habilidades</h5>
        ${
          p.habilidades.length
            ? p.habilidades.map(h => `
              <p>${h.descricao} (${h.nivel})</p>
            `).join('')
            : '<p>Não informado</p>'
        }

        <h5>Formação</h5>
        ${
          p.formacoes.length
            ? p.formacoes.map(f => `
              <p>${f.curso} - ${f.instituicao} (${f.ano_conclusao})</p>
            `).join('')
            : '<p>Não informado</p>'
        }

        <h5>Preferências</h5>
        ${
          p.preferencias
            ? `
              <p>Área: ${p.preferencias.area_interesse ?? '-'}</p>
              <p>Modalidade: ${p.preferencias.modalidade}</p>
              <p>Regime: ${p.preferencias.regime_preferido}</p>
            `
            : '<p>Não informado</p>'
        }
      </div>
    `;

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
}

// ================= DELETAR PESSOA =================
async function deletarPessoa(id) {
  const confirmar = confirm("Tem certeza que deseja excluir este cadastro?");

  if (!confirmar) return;

  try {
    const res = await fetch(`http://localhost:3000/pessoa/${id}`, {
      method: 'DELETE'
    });

    const result = await res.json();

    if (!res.ok) throw new Error(result.erro);

    alert("Cadastro excluído com sucesso!");

    listarPessoas(); // recarrega lista

  } catch (err) {
    alert(err.message);
  }
}

// carregar automaticamente ao abrir
listarPessoas();

</script>

</body>
</html>
